<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Coherent Publication Channels for CPS Monitoring</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css"
        id="theme">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>
  <div class="reveal">
    <div class="slides"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
  <script>
    (async function initDeck() {
      const slides = document.querySelector('.slides');

      try {
        const response = await fetch('slides.html');
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        slides.innerHTML = await response.text();
      } catch (error) {
        slides.innerHTML = `
          <section class="hero">
            <p class="headline warn">Failed to load slides.</p>
            <p class="subhead">Run \`python3 presentation/tools/build_slides.py\` and serve the \`presentation/\` directory over HTTP.</p>
          </section>
        `;
        console.error(error);
      }

      Reveal.initialize({
        hash: true,
        slideNumber: 'c/t',
        controls: true,
        controlsTutorial: false,
        progress: true,
        center: true,
        transition: 'fade',
        backgroundTransition: 'fade',
        width: 1280,
        height: 720,
        margin: 0.04,
        minScale: 0.2,
        maxScale: 1.6,
        pdfSeparateFragments: false,
        plugins: [ RevealHighlight, RevealNotes ],
      });
    })();
  </script>
</body>
</html>
